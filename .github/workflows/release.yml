name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Only release on feat/fix/breaking — chore/docs/style/etc. are silent
          default_bump: false

      - name: Patch scripts to clone the exact release tag
        if: steps.tag.outputs.new_tag
        run: |
          sed -i "s|git clone --depth=1 https://github.com/patrixr/hyperion.git|git clone --depth=1 --branch ${{ steps.tag.outputs.new_tag }} https://github.com/patrixr/hyperion.git|g" \
            setup_hyperion_isomode.bash \
            hyperion.sh

      - name: Create GitHub Release
        if: steps.tag.outputs.new_tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ steps.tag.outputs.new_tag }} \
            setup_hyperion_isomode.bash \
            hyperion.sh \
            --title "${{ steps.tag.outputs.new_tag }}" \
            --notes "${{ steps.tag.outputs.changelog }}"
